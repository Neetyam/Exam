<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submissions - Admin Dashboard</title>
    <!-- Bootstrap CSS & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --primary: #2563EB;
            --sidebar-bg: #0F172A;
            --bg-canvas: #F8FAFC;
            --card-bg: #FFFFFF;
            --border-color: #E2E8F0;
            --text-primary: #0F172A;
            --text-secondary: #64748B;
            --success: #22C55E;
            --warning: #F59E0B;
            --danger: #EF4444;
            --sidebar-width: 260px;
            --transition-smooth: all 0.25s ease;
        }

        body {
            background-color: var(--bg-canvas);
            color: var(--text-secondary);
            font-family: 'Inter', sans-serif !important;
            font-size: 14px;
            min-height: 100vh;
        }

        .main-content {
            margin-left: var(--sidebar-width);
            padding: 2rem;
            transition: var(--transition-smooth);
        }

        .table-responsive {
            background: #ffffff;
            border-radius: 8px;
        }

        .table tbody tr {
            transition: var(--transition-smooth);
            border-bottom: 1px solid var(--border-color);
        }

        .table tbody tr:last-child {
            border-bottom: none;
        }

        .table tbody tr:hover {
            background-color: #F8FAFC !important;
        }

        /* SaaS Table pill styling */
        .badge-pill-custom {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.25rem 0.6rem;
            font-size: 12px;
            font-weight: 600;
            border-radius: 100px;
        }

        .badge-pending {
            background-color: rgba(245, 158, 11, 0.12);
            color: var(--warning);
        }

        .badge-evaluated {
            background-color: rgba(34, 197, 94, 0.12);
            color: var(--success);
        }

        .badge-terminated {
            background-color: rgba(239, 68, 68, 0.12);
            color: var(--danger);
        }

        @media (max-width: 991.98px) {
            .main-content {
                margin-left: 0;
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- Include Sidebar Fragment -->
    <div th:replace="~{admin/fragments :: sidebar('submissions')}"></div>

    <main class="main-content">
        <!-- Page Header -->
        <header class="d-flex flex-wrap align-items-center justify-content-between pb-3 mb-4 border-bottom">
            <div>
                <h1 class="h2 mb-1">Student Submissions</h1>
                <p class="text-meta small mb-0">Monitor and evaluate exam submissions</p>
            </div>
            
            <div class="d-flex align-items-center gap-3 mt-3 mt-md-0">
                <button class="btn btn-outline-light border text-secondary p-2" style="width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;">
                    <i class="bi bi-bell"></i>
                </button>
                <div class="profile-avatar bg-primary text-white" style="width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-weight: 700;" th:text="${#strings.substring(adminName, 0, 1)}">S</div>
            </div>
        </header>

        <!-- Top Filter Bar -->
        <div class="card border-0 shadow-sm rounded-3 bg-white p-3 mb-4">
            <form th:action="@{/admin/submissions}" method="get" class="row g-3 align-items-end">
                <!-- Course Name dropdown -->
                <div class="col-md-3">
                    <label class="label-custom small text-muted mb-2 d-block">Course Name</label>
                    <select class="form-select py-2 text-dark fw-medium" name="course">
                        <option value="">All Courses</option>
                        <option value="BCA" th:selected="${selectedCourse == 'BCA'}">BCA</option>
                        <option value="MCA" th:selected="${selectedCourse == 'MCA'}">MCA</option>
                    </select>
                </div>
                <!-- Semester dropdown -->
                <div class="col-md-3">
                    <label class="label-custom small text-muted mb-2 d-block">Academic Semester</label>
                    <select class="form-select py-2 text-dark fw-medium" name="semester">
                        <option value="">All Semesters</option>
                        <option value="1" th:selected="${selectedSemester == '1'}">Sem 1</option>
                        <option value="2" th:selected="${selectedSemester == '2'}">Sem 2</option>
                        <option value="3" th:selected="${selectedSemester == '3'}">Sem 3</option>
                        <option value="4" th:selected="${selectedSemester == '4'}">Sem 4</option>
                        <option value="5" th:selected="${selectedSemester == '5'}">Sem 5</option>
                        <option value="6" th:selected="${selectedSemester == '6'}">Sem 6</option>
                    </select>
                </div>
                <!-- Division dropdown -->
                <div class="col-md-3">
                    <label class="label-custom small text-muted mb-2 d-block">Division</label>
                    <select class="form-select py-2 text-dark fw-medium" name="division">
                        <option value="">All Divisions</option>
                        <option value="A" th:selected="${selectedDivision == 'A'}">Division A</option>
                        <option value="B" th:selected="${selectedDivision == 'B'}">Division B</option>
                    </select>
                </div>
                <!-- Apply Filters Button -->
                <div class="col-md-3">
                    <button type="submit" class="btn btn-primary w-100 fw-semibold py-2">
                        <i class="bi bi-funnel me-2"></i>Apply Filters
                    </button>
                </div>
            </form>
        </div>

        <!-- Data Table Card -->
        <div class="card border-0 shadow-sm rounded-3 bg-white p-4">
            <div class="table-responsive">
                <table class="table align-middle mb-0 text-dark">
                    <thead class="table-light sticky-top">
                        <tr class="label-custom small">
                            <th class="py-3">Enrollment No</th>
                            <th class="py-3">Student Name</th>
                            <th class="py-3">Course & Sem</th>
                            <th class="py-3">Subject</th>
                            <th class="py-3">Status</th>
                            <th class="py-3 text-end">Action</th>
                        </tr>
                    </thead>
                    <tbody class="text-secondary">
                        <!-- Submission Row Iteration -->
                        <tr th:each="sub : ${submissions}">
                            <td class="py-3">
                                <a th:href="@{/admin/evaluate(id=${sub.id})}" class="text-primary fw-semibold text-decoration-none" th:text="${sub.student != null ? sub.student.enrollmentNo : 'N/A'}">2023BCA001</a>
                            </td>
                            <td class="py-3 fw-semibold text-dark" th:text="${sub.student != null ? sub.student.name : 'Student Name'}">Student Name</td>
                            <td class="py-3" th:text="${sub.paper != null ? (sub.paper.course + ' - Sem ' + sub.paper.semester) : 'N/A'}">BCA - Sem 3</td>
                            <td class="py-3 fw-semibold text-dark" th:text="${sub.paper != null ? sub.paper.subject : 'N/A'}">Advanced Java</td>
                            <td class="py-3">
                                <span class="badge-pill-custom" 
                                      th:classappend="${sub.status == 'Evaluated'} ? 'badge-evaluated' : (${sub.status == 'Pending'} ? 'badge-pending' : 'badge-terminated')">
                                    <i class="bi" th:classappend="${sub.status == 'Evaluated'} ? 'bi-check-circle-fill' : (${sub.status == 'Pending'} ? 'bi-hourglass-split' : 'bi-slash-circle-fill')"></i>
                                    <span th:text="${sub.status}">Pending</span>
                                </span>
                            </td>
                            <td class="py-3 text-end">
                                <a th:href="@{/admin/evaluate(id=${sub.id})}" 
                                   class="btn btn-outline-primary btn-sm py-1 fw-semibold" 
                                   th:text="${sub.status == 'Pending' ? 'Evaluate' : 'View Result'}">Evaluate</a>
                            </td>
                        </tr>
                        
                        <!-- Empty State Placeholders -->
                        <tr th:if="${submissions == null or submissions.isEmpty()}">
                            <td colspan="6" class="text-center py-5 text-muted">
                                <div class="bg-primary bg-opacity-10 text-primary d-inline-flex align-items-center justify-content-center mb-3" style="width: 56px; height: 56px; border-radius: 50%;">
                                    <i class="bi bi-inbox fs-3 text-primary"></i>
                                </div>
                                <h6 class="fw-bold text-dark mb-1">No submissions found</h6>
                                <p class="small text-secondary mb-0">Try adjusting your filter criteria</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <!-- SaaS Standard Pagination component -->
            <div class="d-flex justify-content-center mt-4 mb-0" th:if="${submissions != null and !submissions.isEmpty()}">
                <nav aria-label="Page navigation">
                    <ul class="pagination pagination-sm mb-0">
                        <li class="page-item disabled">
                            <a class="page-link" href="#" aria-label="Previous">
                                <span aria-hidden="true">&laquo;</span>
                            </a>
                        </li>
                        <li class="page-item active"><a class="page-link" href="#">1</a></li>
                        <li class="page-item"><a class="page-link" href="#">2</a></li>
                        <li class="page-item"><a class="page-link" href="#">3</a></li>
                        <li class="page-item">
                            <a class="page-link" href="#" aria-label="Next">
                                <span aria-hidden="true">&raquo;</span>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
